<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周星驰贴吧&星迷会 · 负责人联系表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange:  #E85D04;
    --yellow:  #FFB703;
    --dark:    #3D1F00;
    --mid:     #7A3B00;
    --bg:      #FFF8F0;
    --card:    #FFFFFF;
    --border:  #F5DFC0;
    --success: #2D6A4F;
  }
  body {
    background: var(--bg);
    color: var(--dark);
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(160deg, #B84000 0%, var(--orange) 45%, var(--yellow) 100%);
    padding: 36px 20px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 200px;
  }
  /* 底纹 */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  /* 人物图：右下角锚定，底部自然融入 */
  .hero-person {
    position: absolute;
    right: -8px;
    bottom: 0;
    height: 92%;
    max-height: 220px;
    object-fit: contain;
    object-position: bottom right;
    pointer-events: none;
    opacity: 0.92;
    /* 让人物右侧和底部与背景渐融 */
    -webkit-mask-image: linear-gradient(to right, black 60%, transparent 100%),
                        linear-gradient(to top, transparent 0%, black 25%);
    -webkit-mask-composite: source-in;
    mask-image: linear-gradient(to right, black 60%, transparent 100%),
                linear-gradient(to top, transparent 0%, black 25%);
    mask-composite: intersect;
  }
  .hero-eyebrow {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    margin-bottom: 10px;
    position: relative; z-index: 2;
  }
  .hero-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(26px, 7vw, 38px);
    font-weight: 900;
    color: #fff;
    line-height: 1.25;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }
  .hero-title span { color: var(--yellow); }
  .hero-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 24px;
    position: relative; z-index: 2;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    max-width: 420px;
    margin: 0 auto;
    z-index: 2;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: none;
    border-radius: 50px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    color: var(--dark);
    background: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    outline: none;
    transition: box-shadow 0.2s;
  }
  #search:focus { box-shadow: 0 4px 24px rgba(0,0,0,0.25); }
  #search::placeholder { color: #bbb; }

  /* ── BODY ── */
  .body-wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--orange);
    text-transform: uppercase;
    padding: 28px 0 12px;
  }
  .chief-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 8px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.18s, box-shadow 0.18s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card:active { transform: scale(0.97); }
  .card.copied {
    border-color: var(--success);
    box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
  }
  .card-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    color: #fff;
    overflow: hidden;
  }
  .card-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-region {
    font-size: 10px;
    color: var(--mid);
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-wechat {
    font-size: 11px;
    color: #bbb;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  .chief-grid .card-wechat { display: none; }
  .chief-grid .copy-btn { display: none; }

  .copy-btn {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .card.copied .copy-btn { background: #D8F3DC; }
  .copy-icon { display: block; }
  .check-icon { display: none; }
  .card.copied .copy-icon { display: none; }
  .card.copied .check-icon { display: block; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark);
    color: #fff;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 50px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .region-list { display: flex; flex-direction: column; gap: 8px; }
  .region-list .card { border-radius: 12px; }

  .no-result {
    text-align: center;
    padding: 40px 0;
    color: #bbb;
    font-size: 14px;
    display: none;
  }
  .footer {
    text-align: center;
    padding-top: 20px;
    padding-bottom: 20px;
  }
  .footer-tip {
    font-size: 12px;
    color: #ccc;
    margin-bottom: 18px;
  }
  .footer-logo {
    display: block;
    width: 90px;
    margin: 0 auto 8px;
    opacity: 0.4;
  }
  .footer-desc {
    font-size: 11.5px;
    color: #d4b89a;
    line-height: 1.7;
    max-width: 300px;
    margin: 0 auto;
    opacity: 0.75;
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .toast { transition: none; }
  }
</style>
</head>

  { region: '广东', name: '江江江江', wechat: 'Jwuji1998' },

  { region: '河南', name: '杨世飞',   wechat: 'shifeixingyang' },

  { region: '浙江', name: '大飞',     wechat: 'zhuhuaiyu' },
  { region: '横店', name: '梅肖',     wechat: 'Nobody2549' },
  { region: '福建', name: '雾列九',   wechat: 'getstamina' },
  { region: '河北', name: '星',       wechat: 'awenmicheal' },
  { region: '甘肃', name: '小黑',     wechat: 'zys408119382' },
  { region: '重庆', name: '燕双鹰',   wechat: 'x15923466469' },
  { region: '广西', name: '林雨天',   wechat: 'wx952734' },
  { region: '辽宁', name: '周星星',   wechat: '878627724' },
  { region: '黑龙江', name: '邢图图', wechat: 'xingtutu1227' },
  { region: '吉林', name: '小七',     wechat: '2250172799' },
  { region: '湖南', name: '玄木',     wechat: 'xm70801' },
  { region: '贵州', name: '一桶星',   wechat: 'RTT-1120' },
  { region: '江苏', name: '汪栩乐',   wechat: 'wangxule77' },
  { region: '天津', name: '妮少',     wechat: 'songni1126' },
  { region: '宁夏', name: '万万',     wechat: '956137088' },
  { region: '内蒙古', name: '七彩祥云', wechat: '13171051913' },
  { region: '新疆', name: '夯繁',     wechat: '2227139089' },
  { region: '山西', name: '九五二七', wechat: 'GuoWan9527' },
  { region: '江西', name: '轩笑',     wechat: 'tyt15170202322' },
  { region: '西藏', name: '池',       wechat: 'AIZHOUXINGCHI620622' },
  { region: '青海', name: '偷总',     wechat: '13725153511' },

];

function firstChar(str) { return [...str][0] || '?'; }

function makeCard(item) {
  const d = document.createElement('div');
  d.className = 'card';
  d.dataset.wechat = item.wechat;
  d.dataset.region = item.region;
  d.dataset.name = item.name;
  d.innerHTML = `
    <div class="card-avatar">${firstChar(item.name)}</div>
    <div class="card-info">
      <div class="card-region">${item.region}</div>
      <div class="card-name">${item.name}</div>
      <div class="card-wechat">${item.wechat}</div>
    </div>
    <div class="copy-btn">
      <svg class="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2D6A4F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>`;
  return d;
}

const list = document.getElementById('region-list');
CONTACTS.forEach(item => list.appendChild(makeCard(item)));

let toastTimer;
function copyWechat(card) {
  const wechat = card.dataset.wechat;
  const name = card.dataset.name;
  const doIt = () => {
    card.classList.add('copied');
    setTimeout(() => card.classList.remove('copied'), 2000);
    showToast(`已复制 ${name} 的微信号`);
  };
  navigator.clipboard.writeText(wechat).then(doIt).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = wechat; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    doIt();
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (card) copyWechat(card);
});

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const allCards = list.querySelectorAll('.card');
  const chiefGrid = document.getElementById('chief-grid');
  const labelChief = document.getElementById('label-chief');
  const labelRegion = document.getElementById('label-region');
  const noResult = document.getElementById('no-result');
  if (!q) {
    allCards.forEach(c => c.style.display = '');
    chiefGrid.style.display = ''; labelChief.style.display = '';
    labelRegion.style.display = ''; noResult.style.display = 'none'; return;
  }
  chiefGrid.style.display = 'none'; labelChief.style.display = 'none';
  labelRegion.style.display = '';
  let visible = 0;
  allCards.forEach(c => {
    const match = c.dataset.region.includes(q) || c.dataset.name.toLowerCase().includes(q) || c.dataset.wechat.toLowerCase().includes(q);
    c.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  noResult.style.display = visible === 0 ? 'block' : 'none';
});
</script>
</body>
</html>
